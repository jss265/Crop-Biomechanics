; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:arduino_nano_esp32]
platform = espressif32
board = arduino_nano_esp32
framework = arduino
monitor_speed = 115200 ;921600
upload_protocol = esptool

lib_deps =
    ; for ADS1220
    git+https://github.com/Protocentral/Protocentral_ADS1220.git

    ; for ISM330 and LIS3 (obselete, do not use in future versions)
    git+https://github.com/adafruit/Adafruit_LIS3MDL
    git+https://github.com/adafruit/adafruit_lsm6ds ; compatible with ISM330DHCX

    ; ISM330 and LIS3 dependencies (obselete, do not use in future versions)
    git+https://github.com/adafruit/Adafruit_Sensor
    git+https://github.com/adafruit/Adafruit_BusIO
    